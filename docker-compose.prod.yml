name: lodia-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: lodia
      POSTGRES_USER: lodia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - ./storage/prod/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lodia -d lodia"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ./storage/prod/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    environment:
      LODIA_ENV: production
      LODIA_DATA_DIR: /data
      POSTGRES_DSN: postgresql://lodia:${POSTGRES_PASSWORD}@postgres:5432/lodia
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LODIA_QUEUE_BACKEND: ${LODIA_QUEUE_BACKEND:-redis}
      LODIA_DB_POOL_MIN_SIZE: ${LODIA_DB_POOL_MIN_SIZE:-1}
      LODIA_DB_POOL_MAX_SIZE: ${LODIA_DB_POOL_MAX_SIZE:-10}
      LODIA_ALLOWED_ORIGINS: ${LODIA_ALLOWED_ORIGINS:-http://localhost:18080}
      LODIA_ASYNC_PROCESSING: ${LODIA_ASYNC_PROCESSING:-true}
      LODIA_RAW_OBJECT_TTL_HOURS: ${LODIA_RAW_OBJECT_TTL_HOURS:-24}
      LODIA_PASSWORD_PEPPER: ${LODIA_PASSWORD_PEPPER:?LODIA_PASSWORD_PEPPER is required}
      LODIA_MAX_ASSET_BYTES: ${LODIA_MAX_ASSET_BYTES:-1048576}
      LODIA_UPLOAD_SESSION_TTL_SECONDS: ${LODIA_UPLOAD_SESSION_TTL_SECONDS:-900}
      LODIA_MAX_REQUEST_BODY_BYTES: ${LODIA_MAX_REQUEST_BODY_BYTES:-1048576}
      LODIA_RATE_LIMIT_ENABLED: ${LODIA_RATE_LIMIT_ENABLED:-true}
      LODIA_RATE_LIMIT_REQUESTS: ${LODIA_RATE_LIMIT_REQUESTS:-120}
      LODIA_RATE_LIMIT_WINDOW_SECONDS: ${LODIA_RATE_LIMIT_WINDOW_SECONDS:-60}
      LODIA_TRUST_PROXY_HEADERS: ${LODIA_TRUST_PROXY_HEADERS:-false}
      LODIA_REQUIRE_REQUEST_SIGNATURE: ${LODIA_REQUIRE_REQUEST_SIGNATURE:-false}
      LODIA_REQUEST_SIGNATURE_SECRET: ${LODIA_REQUEST_SIGNATURE_SECRET:-}
      LODIA_MAX_PAGE_LIMIT: ${LODIA_MAX_PAGE_LIMIT:-500}
      LODIA_DATASET_MAX_CASES: ${LODIA_DATASET_MAX_CASES:-5000}
      LODIA_INBOUND_DOMAIN: ${LODIA_INBOUND_DOMAIN:-inbox.lodia.local}
      LODIA_INBOUND_GATEWAY_TOKEN: ${LODIA_INBOUND_GATEWAY_TOKEN:?LODIA_INBOUND_GATEWAY_TOKEN is required}
      LODIA_PROVIDER_ADAPTER_MODE: ${LODIA_PROVIDER_ADAPTER_MODE:-mock}
      LODIA_OBJECT_STORAGE_BACKEND: ${LODIA_OBJECT_STORAGE_BACKEND:-local}
      LODIA_OBJECT_STORAGE_DIR: ${LODIA_OBJECT_STORAGE_DIR:-/objects}
      LODIA_S3_BUCKET: ${LODIA_S3_BUCKET:-}
      LODIA_S3_ENDPOINT_URL: ${LODIA_S3_ENDPOINT_URL:-}
      LODIA_S3_REGION: ${LODIA_S3_REGION:-}
      LODIA_S3_PREFIX: ${LODIA_S3_PREFIX:-lodia}
      LODIA_S3_SSE_ALGORITHM: ${LODIA_S3_SSE_ALGORITHM:-AES256}
      LODIA_S3_KMS_KEY_ID: ${LODIA_S3_KMS_KEY_ID:-}
      LODIA_ADMIN_TOKEN: ${LODIA_ADMIN_TOKEN:?LODIA_ADMIN_TOKEN is required}
      LODIA_REVIEWER_TOKEN: ${LODIA_REVIEWER_TOKEN:?LODIA_REVIEWER_TOKEN is required}
      LODIA_CONTRIBUTOR_TOKEN: ${LODIA_CONTRIBUTOR_TOKEN:?LODIA_CONTRIBUTOR_TOKEN is required}
    volumes:
      - ./storage/prod:/data
      - ./storage/prod/objects:/objects
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/ready', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  worker:
    build:
      context: ./apps/api
    command: python worker.py
    restart: unless-stopped
    environment:
      LODIA_ENV: production
      LODIA_DATA_DIR: /data
      POSTGRES_DSN: postgresql://lodia:${POSTGRES_PASSWORD}@postgres:5432/lodia
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LODIA_QUEUE_BACKEND: ${LODIA_QUEUE_BACKEND:-redis}
      LODIA_DB_POOL_MIN_SIZE: ${LODIA_DB_POOL_MIN_SIZE:-1}
      LODIA_DB_POOL_MAX_SIZE: ${LODIA_DB_POOL_MAX_SIZE:-10}
      LODIA_DATASET_MAX_CASES: ${LODIA_DATASET_MAX_CASES:-5000}
      LODIA_INBOUND_DOMAIN: ${LODIA_INBOUND_DOMAIN:-inbox.lodia.local}
      LODIA_INBOUND_GATEWAY_TOKEN: ${LODIA_INBOUND_GATEWAY_TOKEN:-}
      LODIA_PROVIDER_ADAPTER_MODE: ${LODIA_PROVIDER_ADAPTER_MODE:-mock}
      LODIA_RAW_OBJECT_TTL_HOURS: ${LODIA_RAW_OBJECT_TTL_HOURS:-24}
      LODIA_PASSWORD_PEPPER: ${LODIA_PASSWORD_PEPPER:?LODIA_PASSWORD_PEPPER is required}
      LODIA_MAX_ASSET_BYTES: ${LODIA_MAX_ASSET_BYTES:-1048576}
      LODIA_UPLOAD_SESSION_TTL_SECONDS: ${LODIA_UPLOAD_SESSION_TTL_SECONDS:-900}
      LODIA_OBJECT_STORAGE_BACKEND: ${LODIA_OBJECT_STORAGE_BACKEND:-local}
      LODIA_OBJECT_STORAGE_DIR: ${LODIA_OBJECT_STORAGE_DIR:-/objects}
      LODIA_S3_BUCKET: ${LODIA_S3_BUCKET:-}
      LODIA_S3_ENDPOINT_URL: ${LODIA_S3_ENDPOINT_URL:-}
      LODIA_S3_REGION: ${LODIA_S3_REGION:-}
      LODIA_S3_PREFIX: ${LODIA_S3_PREFIX:-lodia}
      LODIA_S3_SSE_ALGORITHM: ${LODIA_S3_SSE_ALGORITHM:-AES256}
      LODIA_S3_KMS_KEY_ID: ${LODIA_S3_KMS_KEY_ID:-}
      LODIA_WORKER_QUEUE: ingestion
    volumes:
      - ./storage/prod:/data
      - ./storage/prod/objects:/objects
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
    restart: unless-stopped
    ports:
      - "${LODIA_BIND_HOST:-127.0.0.1}:${LODIA_WEB_PORT:-18080}:80"
    depends_on:
      api:
        condition: service_healthy
