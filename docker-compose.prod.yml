name: lodia-prod

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: lodia
      MYSQL_USER: lodia
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=${MYSQL_INNODB_BUFFER_POOL_SIZE:-1G}
      - --max-connections=${MYSQL_MAX_CONNECTIONS:-800}
    volumes:
      - ./storage/prod/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u lodia -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory ${REDIS_MAXMEMORY:-512mb} --maxmemory-policy allkeys-lru
    volumes:
      - ./storage/prod/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: ${LODIA_API_IMAGE:-ghcr.io/codywiki/lodia-api:latest}
    restart: unless-stopped
    environment:
      LODIA_ENV: production
      LODIA_DEPLOYMENT_PROFILE: ${LODIA_DEPLOYMENT_PROFILE:-china_independent}
      LODIA_DATA_FOCUS: ${LODIA_DATA_FOCUS:-llm_long_horizon_task}
      LODIA_HTTP_ADDR: :8080
      MYSQL_DSN: ${MYSQL_DSN:-lodia:${MYSQL_PASSWORD}@tcp(mysql:3306)/lodia?parseTime=true&charset=utf8mb4&loc=UTC}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LODIA_WORKER_QUEUE: ${LODIA_WORKER_QUEUE:-ingestion}
      LODIA_ASYNC_PROCESSING: ${LODIA_ASYNC_PROCESSING:-true}
      LODIA_MAX_REQUEST_BODY_BYTES: ${LODIA_MAX_REQUEST_BODY_BYTES:-1048576}
      LODIA_DATASET_MAX_CASES: ${LODIA_DATASET_MAX_CASES:-5000}
      LODIA_RAW_OBJECT_TTL_HOURS: ${LODIA_RAW_OBJECT_TTL_HOURS:-24}
      LODIA_PURGE_RAW_AFTER_PROCESSING: ${LODIA_PURGE_RAW_AFTER_PROCESSING:-true}
      LODIA_ALLOWED_ORIGINS: ${LODIA_ALLOWED_ORIGINS:-}
      LODIA_OBJECT_STORAGE_BACKEND: ${LODIA_OBJECT_STORAGE_BACKEND:-oss}
      LODIA_RATE_LIMIT_ENABLED: ${LODIA_RATE_LIMIT_ENABLED:-true}
      LODIA_RATE_LIMIT_REQUESTS: ${LODIA_RATE_LIMIT_REQUESTS:-600}
      LODIA_RATE_LIMIT_WINDOW_SECONDS: ${LODIA_RATE_LIMIT_WINDOW_SECONDS:-60}
      LODIA_TRUST_PROXY_HEADERS: ${LODIA_TRUST_PROXY_HEADERS:-false}
      LODIA_ACCESS_LOG_ENABLED: ${LODIA_ACCESS_LOG_ENABLED:-true}
      LODIA_MODEL_GATEWAY_MODE: ${LODIA_MODEL_GATEWAY_MODE:-http}
      LODIA_MODEL_GATEWAY_PROVIDER_TYPE: ${LODIA_MODEL_GATEWAY_PROVIDER_TYPE:-llm}
      LODIA_MODEL_GATEWAY_PROVIDER_NAME: ${LODIA_MODEL_GATEWAY_PROVIDER_NAME:-}
      LODIA_MODEL_GATEWAY_REGION: ${LODIA_MODEL_GATEWAY_REGION:-CN}
      LODIA_MODEL_GATEWAY_ENDPOINT: ${LODIA_MODEL_GATEWAY_ENDPOINT:-}
      LODIA_MODEL_GATEWAY_API_KEY: ${LODIA_MODEL_GATEWAY_API_KEY:-}
      LODIA_MODEL_GATEWAY_MODEL: ${LODIA_MODEL_GATEWAY_MODEL:-}
      LODIA_MODEL_GATEWAY_PROMPT_VERSION: ${LODIA_MODEL_GATEWAY_PROMPT_VERSION:-long_horizon_task.v1}
      LODIA_MODEL_GATEWAY_TIMEOUT_SECONDS: ${LODIA_MODEL_GATEWAY_TIMEOUT_SECONDS:-15}
      LODIA_MODEL_GATEWAY_MAX_INPUT_CHARS: ${LODIA_MODEL_GATEWAY_MAX_INPUT_CHARS:-8000}
      LODIA_OBJECT_STORAGE_DIR: ${LODIA_OBJECT_STORAGE_DIR:-/objects}
      LODIA_OSS_ENDPOINT: ${LODIA_OSS_ENDPOINT:-}
      LODIA_OSS_BUCKET: ${LODIA_OSS_BUCKET:-}
      LODIA_OSS_PREFIX: ${LODIA_OSS_PREFIX:-lodia}
      LODIA_OSS_ACCESS_KEY_ID: ${LODIA_OSS_ACCESS_KEY_ID:-}
      LODIA_OSS_ACCESS_KEY_SECRET: ${LODIA_OSS_ACCESS_KEY_SECRET:-}
      LODIA_OBJECT_STORAGE_STS_ENABLED: ${LODIA_OBJECT_STORAGE_STS_ENABLED:-true}
      LODIA_OSS_STS_ROLE_ARN: ${LODIA_OSS_STS_ROLE_ARN:-}
      LODIA_OSS_STS_ENDPOINT_URL: ${LODIA_OSS_STS_ENDPOINT_URL:-https://sts.aliyuncs.com}
      LODIA_OSS_STS_SESSION_NAME: ${LODIA_OSS_STS_SESSION_NAME:-lodia-upload}
      LODIA_OSS_STS_DURATION_SECONDS: ${LODIA_OSS_STS_DURATION_SECONDS:-900}
      ALIBABA_CLOUD_ACCESS_KEY_ID: ${ALIBABA_CLOUD_ACCESS_KEY_ID:-}
      ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET:-}
      LODIA_ADMIN_TOKEN: ${LODIA_ADMIN_TOKEN:?LODIA_ADMIN_TOKEN is required}
      LODIA_REVIEWER_TOKEN: ${LODIA_REVIEWER_TOKEN:?LODIA_REVIEWER_TOKEN is required}
      LODIA_CONTRIBUTOR_TOKEN: ${LODIA_CONTRIBUTOR_TOKEN:?LODIA_CONTRIBUTOR_TOKEN is required}
      LODIA_PASSWORD_PEPPER: ${LODIA_PASSWORD_PEPPER:?LODIA_PASSWORD_PEPPER is required}
    volumes:
      - ./storage/prod/objects:/objects
    expose:
      - "8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/ready >/dev/null"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 5

  worker:
    image: ${LODIA_WORKER_IMAGE:-ghcr.io/codywiki/lodia-api:latest}
    entrypoint: ["/app/lodia-worker"]
    restart: unless-stopped
    environment:
      LODIA_ENV: production
      LODIA_DEPLOYMENT_PROFILE: ${LODIA_DEPLOYMENT_PROFILE:-china_independent}
      LODIA_DATA_FOCUS: ${LODIA_DATA_FOCUS:-llm_long_horizon_task}
      MYSQL_DSN: ${MYSQL_DSN:-lodia:${MYSQL_PASSWORD}@tcp(mysql:3306)/lodia?parseTime=true&charset=utf8mb4&loc=UTC}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LODIA_WORKER_QUEUE: ${LODIA_WORKER_QUEUE:-ingestion}
      LODIA_MODEL_GATEWAY_MODE: ${LODIA_MODEL_GATEWAY_MODE:-http}
      LODIA_MODEL_GATEWAY_PROVIDER_TYPE: ${LODIA_MODEL_GATEWAY_PROVIDER_TYPE:-llm}
      LODIA_MODEL_GATEWAY_PROVIDER_NAME: ${LODIA_MODEL_GATEWAY_PROVIDER_NAME:-}
      LODIA_MODEL_GATEWAY_REGION: ${LODIA_MODEL_GATEWAY_REGION:-CN}
      LODIA_MODEL_GATEWAY_ENDPOINT: ${LODIA_MODEL_GATEWAY_ENDPOINT:-}
      LODIA_MODEL_GATEWAY_API_KEY: ${LODIA_MODEL_GATEWAY_API_KEY:-}
      LODIA_MODEL_GATEWAY_MODEL: ${LODIA_MODEL_GATEWAY_MODEL:-}
      LODIA_MODEL_GATEWAY_PROMPT_VERSION: ${LODIA_MODEL_GATEWAY_PROMPT_VERSION:-long_horizon_task.v1}
      LODIA_MODEL_GATEWAY_TIMEOUT_SECONDS: ${LODIA_MODEL_GATEWAY_TIMEOUT_SECONDS:-15}
      LODIA_MODEL_GATEWAY_MAX_INPUT_CHARS: ${LODIA_MODEL_GATEWAY_MAX_INPUT_CHARS:-8000}
      LODIA_OBJECT_STORAGE_BACKEND: ${LODIA_OBJECT_STORAGE_BACKEND:-oss}
      LODIA_OBJECT_STORAGE_DIR: ${LODIA_OBJECT_STORAGE_DIR:-/objects}
      LODIA_OSS_ENDPOINT: ${LODIA_OSS_ENDPOINT:-}
      LODIA_OSS_BUCKET: ${LODIA_OSS_BUCKET:-}
      LODIA_OSS_PREFIX: ${LODIA_OSS_PREFIX:-lodia}
      LODIA_OSS_ACCESS_KEY_ID: ${LODIA_OSS_ACCESS_KEY_ID:-}
      LODIA_OSS_ACCESS_KEY_SECRET: ${LODIA_OSS_ACCESS_KEY_SECRET:-}
      LODIA_OBJECT_STORAGE_STS_ENABLED: ${LODIA_OBJECT_STORAGE_STS_ENABLED:-true}
      LODIA_OSS_STS_ROLE_ARN: ${LODIA_OSS_STS_ROLE_ARN:-}
      LODIA_OSS_STS_ENDPOINT_URL: ${LODIA_OSS_STS_ENDPOINT_URL:-https://sts.aliyuncs.com}
      LODIA_OSS_STS_SESSION_NAME: ${LODIA_OSS_STS_SESSION_NAME:-lodia-upload}
      LODIA_OSS_STS_DURATION_SECONDS: ${LODIA_OSS_STS_DURATION_SECONDS:-900}
      ALIBABA_CLOUD_ACCESS_KEY_ID: ${ALIBABA_CLOUD_ACCESS_KEY_ID:-}
      ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET:-}
      LODIA_PURGE_RAW_AFTER_PROCESSING: ${LODIA_PURGE_RAW_AFTER_PROCESSING:-true}
      LODIA_PASSWORD_PEPPER: ${LODIA_PASSWORD_PEPPER:?LODIA_PASSWORD_PEPPER is required}
      LODIA_ACCESS_LOG_ENABLED: ${LODIA_ACCESS_LOG_ENABLED:-true}
    volumes:
      - ./storage/prod/objects:/objects
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: ${LODIA_WEB_IMAGE:-ghcr.io/codywiki/lodia-web:latest}
    restart: unless-stopped
    ports:
      - "${LODIA_BIND_HOST:-127.0.0.1}:${LODIA_WEB_PORT:-18080}:80"
    depends_on:
      api:
        condition: service_healthy
