name: Reconstruct docs

on:
  workflow_dispatch:
  push:
    paths:
      - ".lodia-upload-v2/READY"

permissions:
  contents: write

jobs:
  reconstruct:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore full documentation files
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          parts=(.lodia-upload-v2/lodia_docs_tar_gz_b64.part*)
          if [ "${#parts[@]}" -ne 23 ]; then
            echo "Expected 23 parts, found ${#parts[@]}"
            exit 1
          fi
          cat "${parts[@]}" | tr -d '\n' | base64 -d > /tmp/lodia-docs.tar.gz
          echo "ece8b2dcab3c22c2349f4ba0e7b94960ba6f47fee107ef898c2d6faaaf1fff27  /tmp/lodia-docs.tar.gz" | sha256sum -c -
          tar -xzf /tmp/lodia-docs.tar.gz
          rm -rf .lodia-upload .lodia-upload-v2 .github/workflows/reconstruct-docs.yml

      - name: Commit restored docs
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Add full Lodia docs and AGPL license"
          git push
