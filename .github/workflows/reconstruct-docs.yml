name: Reconstruct docs

on:
  push:
    paths:
      - ".lodia-upload/READY"

permissions:
  contents: write

jobs:
  reconstruct:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore full documentation files
        shell: bash
        run: |
          set -euo pipefail
          cat .lodia-upload/lodia_docs_tar_gz_b64.part* | tr -d '\n' | base64 -d > /tmp/lodia-docs.tar.gz
          tar -xzf /tmp/lodia-docs.tar.gz
          rm -rf .lodia-upload .github/workflows/reconstruct-docs.yml

      - name: Commit restored docs
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Add full Lodia docs and AGPL license"
          git push
