name: App Checks

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: app-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache-dependency-path: apps/api-go/go.sum

      - name: Verify formatting
        working-directory: apps/api-go
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi

      - name: Verify dependencies
        working-directory: apps/api-go
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Run Go tests
        working-directory: apps/api-go
        run: go test ./...

  web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build web app
        working-directory: apps/web
        run: npm run build

  compose-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate development compose
        run: docker compose config --quiet

      - name: Validate production compose
        run: docker compose --env-file .env.production.example -f docker-compose.prod.yml config --quiet

      - name: Validate production build overlay
        run: docker compose --env-file .env.production.example -f docker-compose.prod.yml -f docker-compose.build.yml config --quiet

  image-build:
    runs-on: ubuntu-latest
    needs:
      - go-api
      - web
      - compose-config
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build deployable images
        run: docker compose --env-file .env.production.example -f docker-compose.prod.yml -f docker-compose.build.yml build api web

  production-smoke:
    runs-on: ubuntu-latest
    needs:
      - go-api
      - web
      - compose-config
      - image-build
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install smoke dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Start Go production core
        run: docker compose up -d --build mysql redis api worker

      - name: Run production smoke
        run: make production-smoke

      - name: Stop services
        if: always()
        run: docker compose down -v
