name: App Checks

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API dependencies
        run: python -m pip install -r apps/api/requirements.txt

      - name: Run API tests
        run: PYTHONPATH=apps/api python -m unittest discover apps/api/tests

  web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: apps/web
        run: npm install

      - name: Build web app
        working-directory: apps/web
        run: npm run build
