name: Release Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: release-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            image: lodia-api
            context: ./apps/api-go
          - name: web
            image: lodia-web
            context: ./apps/web
    env:
      GHCR_REGISTRY: ghcr.io
      GHCR_NAMESPACE: ${{ github.repository_owner }}
      ACR_REGISTRY: ${{ secrets.ALIYUN_REGISTRY }}
      ACR_NAMESPACE: ${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}
      ACR_USERNAME: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
      ACR_PASSWORD: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push GHCR image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_NAMESPACE }}/${{ matrix.image }}:latest
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_NAMESPACE }}/${{ matrix.image }}:sha-${{ github.sha }}

      - name: Login to Alibaba Cloud ACR
        if: env.ACR_REGISTRY != '' && env.ACR_NAMESPACE != '' && env.ACR_USERNAME != '' && env.ACR_PASSWORD != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}

      - name: Build and push ACR image
        if: env.ACR_REGISTRY != '' && env.ACR_NAMESPACE != '' && env.ACR_USERNAME != '' && env.ACR_PASSWORD != ''
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ matrix.image }}:latest
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ matrix.image }}:sha-${{ github.sha }}
